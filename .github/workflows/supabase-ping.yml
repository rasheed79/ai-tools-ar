name: Supabase Keep Alive

on:
  schedule:
    # Fixed cron: explicit days 1,6,11,16,21,26 of each month
    # "*/5" is wrong — it means "every 5th day" not "every 5 days"
    - cron: '0 9 1,6,11,16,21,26 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/tools?select=count" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY")
          echo "Supabase ping status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "206" ]; then
            echo "::error::Supabase ping failed with HTTP $HTTP_STATUS"
            exit 1
          fi
